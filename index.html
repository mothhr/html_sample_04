<!DOCTYPE html>
<html lang="jp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <h1>様々なリスト</h1>
<h2>ul</h2>
<p>好きなたべもの</p>
<ul>
  <li>うどん</li>
  <li>オムライス</li>
  <li>ハンバーガー</li>
</ul>

<h2>ol</h2>
<p>好きなたべものベスト3（好きな順）</p>
<ol>
  <li>うどん</li>
  <li>オムライス</li>
  <li>ハンバーガー</li>
</ol>

<h2>dl</h2>
<p>よくある質問</p>
<dl>
  <dt>Q:名前の読み方</dt>
  <dd>A:もとか</dd>
  <dt>Q:ラッコですか</dt>
  <dd>A:アザラシです</dd>
</dl>

</body>
</html>
